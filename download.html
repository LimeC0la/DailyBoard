<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Download Lineup Board</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: system-ui, sans-serif;
           display: flex; flex-direction: column; align-items: center;
           justify-content: center; min-height: 100dvh; gap: 16px; }
    p { color: #9ca3af; font-size: 14px; }
    button { padding: 12px 32px; background: #374151; border: 1px solid #4b5563;
             color: #f9fafb; font-size: 16px; border-radius: 8px; cursor: pointer; }
    button:hover { background: #4b5563; }
  </style>
</head>
<body>
  <p id="msg">Starting download…</p>
  <button onclick="window.close()">Close Tab</button>
  <script>
    const a = document.createElement('a');
    a.href = 'screenshot.png?v=' + Date.now();
    a.download = 'lineup.png';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => {
      window.close();
      // If close didn't work (most mobile browsers), show fallback message
      document.getElementById('msg').textContent = 'Download started — you can close this tab.';
    }, 1500);
  </script>
</body>
</html>
